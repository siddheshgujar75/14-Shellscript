- name: Configure EC2 with Nginx
  hosts: web
  become: true

  tasks:

    - name: Install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Start Nginx
      service:
        name: nginx
        state: started
        enabled: true

    - name: Create HTML file
      copy:
        content: "<h1>Hello from Terraform + Ansible 🚀</h1>"
        dest: /var/www/html/index.html